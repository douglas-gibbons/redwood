model:
  # name: gemini-2.5-pro
  # name: gemini-2.5-flash
  # name: gemini-3.1-pro-preview
  name: gemini-3-flash-preview

  api_key: API-KEY-HERE

# Safety valve, in case of looping
max_model_calls: 20

logging:
  level: INFO
  file: /tmp/redwood.log

ui:
  dark_mode: true

token_storage:
  enabled: false
  location: ~/config/redwood_auth_tokens/ # Directory
  # Make a new token storage key with
  # dd if=/dev/urandom bs=32 count=1 2>/dev/null | openssl base64`
  encryption_key: E/YIKS+62be/MlYpGHlrXW4lW/fgB/DzFx3SrPgsKJ0=

mcp:

  # Redwood Internal Tools
  - name: redwood
    ask: true # ask the user before running tools
    command: uv
    args:
      - "run"
      - "server"

  # Sub-Agent Tool Server
  - name: subagent
    ask: true
    command: uv
    args:
      - "run"
      - "agent"

  # Image Generation Tool Server
  - name: image_generator
    ask: true
    command: uv
    args:
      - "run"
      - "image_generator"
      - "--model"
      - "imagen-4.0-fast-generate-001"
      - "--output-dir"
      - "~/Downloads"

  ## Sequential Thinking
  - name: sequentialthinking
    ask: false # ask the user before running tools
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-sequential-thinking"

  ## DuckDuckGo web search
  - name: duckduckgo
    ask: false
    command: uvx
    args:
      - "duckduckgo-mcp-server"

  ## Filesystem
  - name: filesystem
    ask: true
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/home"

  ## Atlassian
  ##
  ## opens a browser window for authentication
  # - name: atlassian
  #   ask: false
  #   url: https://mcp.atlassian.com/server/v1/mcp

  # HTTP Example Tool with headers
  # - name: http-example
  #   url: https://api.example.com/v1/stream
  #   headers:
  #     Authorization: Bearer API-KEY-HERE


prompt: |
  You are an AI personal assistant who helps a user with day-to-day tasks

  # Remember
  
  * Keep responses brief, but professional and useful
  * Use the tools available to you via MCP to answer questions and perform tasks
  * If you are unsure about something, use the tools to find out more information
  * Always think step-by-step about how to use the tools to achieve the user's goals
  * The agent configuration file is located at ~/ .config/redwood.yaml

  # Images

  * When generating images, use the image_generator tool
  * You can use img src tags to display images in your responses, like this: ![alt text](path/to/image.png)
  * Always let the user know where an image is saved when you generate one, so they can find it later

  # Redwood Configuration

  Your configuration file is located at ~/ .config/redwood.yaml.
  The configuration file contains sections for MCP servers, as well as this prompt.
  You can help the user to edit this file for their needs.
  The user will have to restart the agent for the changes to take effect.
