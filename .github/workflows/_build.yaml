name: Reusable Build

on:
  workflow_call:
    inputs:
      artifact_version:
        required: true
        type: string

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1

  # https://flet.dev/docs/reference/environment-variables
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: linux
            runner: ubuntu-latest
            build_cmd: "flet build linux"
            artifact_path: build/linux/redwood
            output_name: redwood-linux-${{ inputs.artifact_version }}.tar.gz
            needs_linux_deps: true

          - name: macos
            runner: macos-latest
            build_cmd: "flet build macos"
            artifact_path: build/macos/redwood.app
            output_name: redwood-macos-${{ inputs.artifact_version }}.zip
            needs_linux_deps: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.needs_linux_deps
        shell: bash
        run: |
            sudo apt update --allow-releaseinfo-change
            sudo apt-get install -y --no-install-recommends \
              clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
              gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
              gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev
            sudo apt-get clean

      - name: Build app
        shell: bash
        run: |
          uv run ${{ matrix.build_cmd }} --yes --verbose

      - name: Package Assets (Linux)
        if: matrix.name == 'linux'
        run: |
          cd build/linux
          tar -czf ../../${{ matrix.output_name }} redwood

      - name: Package Assets (macOS)
        if: matrix.name == 'macos'
        run: |
          cd build/macos
          zip -r ../../${{ matrix.output_name }} redwood.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.output_name }}
          if-no-files-found: error
          overwrite: false
          retention-days: 7
