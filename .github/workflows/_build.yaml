name: Reusable Build

on:
  workflow_call:
    inputs:
      artifact_version:
        required: true
        type: string

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    name: Build linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        shell: bash
        run: |
            sudo apt update --allow-releaseinfo-change
            sudo apt-get install -y --no-install-recommends \
            clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
            gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev \
            cmake llvm-18 lld libmpv-dev mpv

            sudo apt-get clean

      - name: Build app
        shell: bash
        run: |
          uv sync
          uv run flet build linux --product Redwood --build-version ${{ inputs.artifact_version }} --yes 
          mv build/linux/redwood build/linux/redwood-${{ inputs.artifact_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact
          path: build/linux/redwood-${{ inputs.artifact_version }}
          if-no-files-found: error
          overwrite: false
          retention-days: 7
